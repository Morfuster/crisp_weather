<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffe066;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffab00;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedRect">
      <rect x="20" y="20" width="360" height="360" rx="80" ry="80"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="20" y="20" width="360" height="360" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Sun rays -->
  <g transform="translate(200,165)" filter="url(#glow)">
    <g opacity="0.5">
      <line x1="0" y1="-90" x2="0" y2="-70" stroke="#ffe066" stroke-width="5" stroke-linecap="round"/>
      <line x1="0" y1="-90" x2="0" y2="-70" stroke="#ffe066" stroke-width="5" stroke-linecap="round" transform="rotate(45)"/>
      <line x1="0" y1="-90" x2="0" y2="-70" stroke="#ffe066" stroke-width="5" stroke-linecap="round" transform="rotate(90)"/>
      <line x1="0" y1="-90" x2="0" y2="-70" stroke="#ffe066" stroke-width="5" stroke-linecap="round" transform="rotate(135)"/>
      <line x1="0" y1="-90" x2="0" y2="-70" stroke="#ffe066" stroke-width="5" stroke-linecap="round" transform="rotate(180)"/>
      <line x1="0" y1="-90" x2="0" y2="-70" stroke="#ffe066" stroke-width="5" stroke-linecap="round" transform="rotate(225)"/>
      <line x1="0" y1="-90" x2="0" y2="-70" stroke="#ffe066" stroke-width="5" stroke-linecap="round" transform="rotate(270)"/>
      <line x1="0" y1="-90" x2="0" y2="-70" stroke="#ffe066" stroke-width="5" stroke-linecap="round" transform="rotate(315)"/>
    </g>
    <!-- Sun circle -->
    <circle cx="0" cy="0" r="42" fill="url(#sunGrad)" filter="url(#glow)"/>
  </g>

  <!-- Cloud body -->
  <g transform="translate(200,220)">
    <ellipse cx="-50" cy="0" rx="38" ry="28" fill="white" opacity="0.95"/>
    <ellipse cx="0" cy="-14" rx="46" ry="34" fill="white" opacity="0.95"/>
    <ellipse cx="52" cy="0" rx="36" ry="26" fill="white" opacity="0.95"/>
    <rect x="-86" y="0" width="174" height="30" fill="white" opacity="0.95" rx="4"/>
  </g>

  <!-- Crisp droplets below cloud -->
  <g fill="#7ecfff" opacity="0.85">
    <ellipse cx="155" cy="278" rx="4" ry="6"/>
    <ellipse cx="175" cy="290" rx="4" ry="6"/>
    <ellipse cx="200" cy="282" rx="4" ry="6"/>
    <ellipse cx="225" cy="291" rx="4" ry="6"/>
    <ellipse cx="245" cy="279" rx="4" ry="6"/>
  </g>

  <!-- App name -->
  <text x="200" y="350" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="1" fill="white" opacity="0.95">CrispWeather</text>
</svg>
