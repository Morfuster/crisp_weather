<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="crystalGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5ee7df;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#b490ca;stop-opacity:0.7" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark deep background -->
  <rect x="20" y="20" width="360" height="360" rx="72" ry="72" fill="url(#darkBg)"/>

  <!-- Stars / sparkles -->
  <g fill="white" filter="url(#starGlow)">
    <circle cx="70" cy="80" r="2" opacity="0.8"/>
    <circle cx="130" cy="60" r="1.5" opacity="0.6"/>
    <circle cx="310" cy="90" r="2" opacity="0.7"/>
    <circle cx="340" cy="60" r="1.5" opacity="0.5"/>
    <circle cx="80" cy="130" r="1.5" opacity="0.5"/>
    <circle cx="350" cy="150" r="2" opacity="0.6"/>
    <circle cx="95" cy="55" r="1" opacity="0.9"/>
    <circle cx="285" cy="55" r="1.5" opacity="0.7"/>
  </g>

  <!-- Crystal / snowflake shape -->
  <g transform="translate(200, 175)" filter="url(#softGlow)">
    <!-- Main crystal arms -->
    <line x1="0" y1="-75" x2="0" y2="75" stroke="url(#crystalGrad)" stroke-width="8" stroke-linecap="round"/>
    <line x1="-75" y1="0" x2="75" y2="0" stroke="url(#crystalGrad)" stroke-width="8" stroke-linecap="round"/>
    <line x1="-53" y1="-53" x2="53" y2="53" stroke="url(#crystalGrad2)" stroke-width="5" stroke-linecap="round"/>
    <line x1="53" y1="-53" x2="-53" y2="53" stroke="url(#crystalGrad2)" stroke-width="5" stroke-linecap="round"/>

    <!-- Branch details on vertical arm -->
    <line x1="0" y1="-55" x2="14" y2="-41" stroke="url(#crystalGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="-55" x2="-14" y2="-41" stroke="url(#crystalGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="55" x2="14" y2="41" stroke="url(#crystalGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="55" x2="-14" y2="41" stroke="url(#crystalGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Branch details on horizontal arm -->
    <line x1="-55" y1="0" x2="-41" y2="-14" stroke="url(#crystalGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="-55" y1="0" x2="-41" y2="14" stroke="url(#crystalGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="55" y1="0" x2="41" y2="-14" stroke="url(#crystalGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="55" y1="0" x2="41" y2="14" stroke="url(#crystalGrad)" stroke-width="4" stroke-linecap="round"/>

    <!-- Center gem -->
    <circle cx="0" cy="0" r="14" fill="url(#crystalGrad)" opacity="0.95"/>
    <circle cx="0" cy="0" r="7" fill="white" opacity="0.6"/>
  </g>

  <!-- App name -->
  <text x="200" y="308" text-anchor="middle"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="700" letter-spacing="0" fill="url(#crystalGrad)">CrispWeather</text>
  <!-- Tagline -->
  <text x="200" y="335" text-anchor="middle"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="300" letter-spacing="4" fill="white" opacity="0.5">FORECAST · PRECISE · CLEAR</text>
</svg>
