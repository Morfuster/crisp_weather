<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2ebf2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0077b6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90e0ef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd60a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb703;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Clean white rounded square -->
  <rect x="20" y="20" width="360" height="360" rx="72" ry="72" fill="white" />
  <rect x="20" y="20" width="360" height="360" rx="72" ry="72" fill="url(#bg2)" opacity="0.3"/>

  <!-- Bold arc / rainbow stroke — the "Crisp" element -->
  <path d="M 90 240 A 120 120 0 0 1 310 240"
        fill="none" stroke="url(#arcGrad)" stroke-width="18" stroke-linecap="round"/>

  <!-- Second thinner arc for depth -->
  <path d="M 110 255 A 100 100 0 0 1 290 255"
        fill="none" stroke="#90e0ef" stroke-width="7" stroke-linecap="round" opacity="0.5"/>

  <!-- Sun at the top of arc -->
  <circle cx="200" cy="120" r="48" fill="url(#sunGrad2)"/>
  <!-- Sun ring -->
  <circle cx="200" cy="120" r="58" fill="none" stroke="#ffd60a" stroke-width="5" opacity="0.4"/>

  <!-- Minimal cloud right side -->
  <g transform="translate(268, 188)" opacity="0.7">
    <ellipse cx="0" cy="0" rx="22" ry="16" fill="#caf0f8"/>
    <ellipse cx="16" cy="-8" rx="16" ry="13" fill="#caf0f8"/>
    <rect x="-22" y="0" width="54" height="16" fill="#caf0f8" rx="2"/>
  </g>

  <!-- Text: two-line layout -->
  <text x="200" y="315" text-anchor="middle"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="42" font-weight="800" letter-spacing="-1" fill="#0077b6">Crisp</text>
  <text x="200" y="355" text-anchor="middle"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="28" font-weight="400" letter-spacing="6" fill="#023e8a">WEATHER</text>
</svg>
