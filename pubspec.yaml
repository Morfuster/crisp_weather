name: crisp_weather
description: CrispWeather — Precise local and global weather forecasts.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP & parsing
  http: ^1.2.1
  xml: ^6.5.0

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3

  # Location
  geolocator: ^12.0.0

  # UI
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  intl: ^0.20.2

  # Localization
  easy_localization: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/translations/
